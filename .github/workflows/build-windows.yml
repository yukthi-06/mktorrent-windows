name: Build Windows 64-bit EXE

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Windows 64-bit EXE
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install MinGW Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 make

      - name: Compile mktorrent
        run: |
          make CC=x86_64-w64-mingw32-gcc USE_PTHREADS=1 LDFLAGS="-static"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mktorrent-windows-x64
          path: mktorrent.exe
